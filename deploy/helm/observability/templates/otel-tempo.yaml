apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  otel-collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:
    exporters:
      otlp:
        endpoint: tempo:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
spec:
  replicas: 1
  selector: { matchLabels: { app: otel-collector } }
  template:
    metadata: { labels: { app: otel-collector } }
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.104.0
        args: ["--config=/conf/otel-collector.yaml"]
        ports:
        - { containerPort: 4317 }
        - { containerPort: 4318 }
        volumeMounts:
        - name: conf
          mountPath: /conf
      volumes:
      - name: conf
        configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  selector: { app: otel-collector }
  ports:
  - { name: grpc, port: 4317, targetPort: 4317 }
  - { name: http, port: 4318, targetPort: 4318 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
spec:
  replicas: 1
  selector: { matchLabels: { app: tempo } }
  template:
    metadata: { labels: { app: tempo } }
    spec:
      containers:
      - name: tempo
        image: grafana/tempo:2.6.1
        args: ["-config.file=/etc/tempo.yaml"]
        ports:
        - { containerPort: 4317 }
        volumeMounts:
        - name: cfg
          mountPath: /etc/tempo.yaml
          subPath: tempo.yaml
      volumes:
      - name: cfg
        configMap: { name: tempo-config }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
spec:
  selector: { app: tempo }
  ports:
  - { name: otlp, port: 4317, targetPort: 4317 }
